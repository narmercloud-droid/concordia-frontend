<!DOCTYPE html>
<html lang="de">
  <head>
    <script>
      (function () {
        var supported = ["de", "en", "nl", "pl", "ru", "ro", "hi", "ar", "ku", "tr", "ckb"];
        var pick = null;
        try {
          var stored = localStorage.getItem("concordia-lang-v2");
          if (stored) {
            var saved = stored.split("-")[0].toLowerCase();
            if (supported.indexOf(saved) >= 0) pick = saved;
          }
        } catch (e) {}
        if (!pick && typeof navigator !== "undefined") {
          var list = navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language];
          for (var i = 0; i < list.length; i++) {
            var code = (list[i] || "").split("-")[0].toLowerCase();
            if (supported.indexOf(code) >= 0) {
              pick = code;
              break;
            }
          }
        }
        if (!pick) pick = "de";
        document.documentElement.lang = pick;
        document.documentElement.dir = pick === "ar" || pick === "ckb" ? "rtl" : "ltr";
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1b7340" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="description" content="Concordia Restaurant — Pizza, Pasta & mehr. Online bestellen zur Abholung oder Lieferung." />
    <link rel="dns-prefetch" href="https://concordia-backend-web.onrender.com" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>

        rel="stylesheet"

    <title>Concordia Restaurant</title>
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
