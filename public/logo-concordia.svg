<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="Concordia Restaurant">
  <defs>
    <linearGradient id="cloche-dome" x1="60" y1="28" x2="60" y2="78" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c41e3a"/>
      <stop offset="1" stop-color="#8b1428"/>
    </linearGradient>
    <linearGradient id="cloche-shine" x1="48" y1="40" x2="72" y2="70" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="plate-ring" x1="30" y1="82" x2="90" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d4af37"/>
      <stop offset="0.5" stop-color="#f0c96e"/>
      <stop offset="1" stop-color="#d4af37"/>
    </linearGradient>
  </defs>

  <!-- Outer seal ring -->
  <circle cx="60" cy="60" r="54" stroke="#d4af37" stroke-width="2" opacity="0.5"/>
  <circle cx="60" cy="60" r="48" stroke="#a31830" stroke-width="1" opacity="0.15"/>

  <!-- Steam — fresh from the kitchen -->
  <path
    d="M48 24c0-6 3-10 6-10s6 4 6 10M60 18c0-7 3-11 6-11s6 4 6 11M72 24c0-6 3-10 6-10s6 4 6 10"
    stroke="#a31830"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.4"
  />

  <!-- Cloche dome — classic restaurant service -->
  <path
    d="M34 72 C34 48 46 34 60 34 C74 34 86 48 86 72"
    stroke="url(#cloche-dome)"
    stroke-width="4.5"
    stroke-linecap="round"
    fill="url(#cloche-shine)"
  />

  <!-- Cloche handle -->
  <path
    d="M56 34 C56 28 58 24 60 24 C62 24 64 28 64 34"
    stroke="url(#cloche-dome)"
    stroke-width="3"
    stroke-linecap="round"
  />

  <!-- Plate -->
  <ellipse cx="60" cy="78" rx="30" ry="8" fill="#faf8f5" stroke="url(#plate-ring)" stroke-width="2.5"/>
  <ellipse cx="60" cy="76" rx="22" ry="5" stroke="#a31830" stroke-width="1" opacity="0.2"/>

  <!-- C monogram on the dome — brand mark -->
  <path
    d="M72 50 C58 46 50 56 50 66 C50 74 56 80 66 78"
    stroke="#ffffff"
    stroke-width="3.5"
    stroke-linecap="round"
    fill="none"
    opacity="0.92"
  />
</svg>
