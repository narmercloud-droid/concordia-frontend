  <text x="460" y="248" text-anchor="middle" class="wordmark">Concordia</text>
  <text x="460" y="282" text-anchor="middle" class="subtitle">RESTAURANT</text>
  <line x1="220" y1="300" x2="700" y2="300" stroke="url(#goldLine)" stroke-width="2"/>
  <text x="460" y="328" text-anchor="middle" class="tagline">DEUTSCHE HERZLICHKEIT • ITALIENISCHE LEIDENSCHAFT</text>
  <text x="460" y="358" text-anchor="middle" class="slogan">Wo Harmonie auf dem Teller liegt.</text>
  <g transform="translate(448 372)">
    <ellipse cx="12" cy="10" rx="10" ry="12" fill="#2d5a3d"/>
    <ellipse cx="0" cy="8" rx="8" ry="10" fill="#8B1A2B"/>
