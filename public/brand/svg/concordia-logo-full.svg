      <path d="M24 52 Q50 18 76 52 L72 68 Q50 48 28 68 Z" fill="#fff" stroke="#8B1A2B" stroke-width="2"/>
      <circle cx="50" cy="88" r="22" fill="#f0c9a6"/>
      <path d="M38 90 Q50 100 62 90" fill="none" stroke="#6b4a3a" stroke-width="2" stroke-linecap="round"/>
      <circle cx="42" cy="84" r="2.5" fill="#3d2a22"/>
