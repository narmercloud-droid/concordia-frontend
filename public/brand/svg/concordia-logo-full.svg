<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-label="Concordia Restaurant">
  <defs>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a82a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4a82a"/>
      <stop offset="100%" stop-color="#d4a82a" stop-opacity="0"/>
    </linearGradient>
    <style>
      .wordmark { font-family: "Cormorant Garamond", Georgia, serif; font-size: 72px; font-style: italic; font-weight: 600; fill: #8B1A2B; }
      .subtitle { font-family: "DM Sans", Arial, sans-serif; font-size: 22px; font-weight: 600; letter-spacing: 0.35em; fill: #2d5a3d; }
      .tagline { font-family: "DM Sans", Arial, sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.18em; fill: #2d5a3d; }
      .slogan { font-family: "Cormorant Garamond", Georgia, serif; font-size: 20px; font-style: italic; fill: #8B1A2B; }
